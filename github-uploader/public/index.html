<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Uploader</title>
    <!-- Fonte moderna do Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <header style="position: relative;">
            <button id="btn-logout" class="btn-logout" style="display: none;">Sair</button>
            <h1><span class="gradient-text">GitHub</span> Uploader</h1>
        </header>


        <!-- Tela de Login -->
        <div id="login-screen">
            <p class="subtitle">Conecte sua conta para automatizar uploads e Pull Requests com IA.</p>
            <a href="http://localhost:1000/login" class="btn-primary btn-login">
                <!-- Ícone do GitHub -->
                <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2" fill="none"
                    stroke-linecap="round" stroke-linejoin="round" class="icon">
                    <path
                        d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22">
                    </path>
                </svg>
                Entrar com GitHub
            </a>
        </div>

        <!-- Tela Principal (Dashboard) -->
        <div id="upload-screen" style="display: none;">

            <div class="status-badge">
                <span class="dot"></span> Conectado
            </div>

            <!-- Nossas Novas Abas -->
            <div class="tabs">
                <button class="tab active" id="tab-upload">Novo Repositório</button>
                <button class="tab" id="tab-pr">Criar Pull Request</button>
            </div>

            <div class="tab-content">
                <!-- Caixa de escolher pasta (Compartilhada pelas duas abas) -->
                <div class="upload-box">
                    <p class="box-title">Pasta do Projeto Local</p>
                    <input type="file" id="folder-input" webkitdirectory directory multiple style="display: none;">
                    <label for="folder-input" class="custom-file-upload">
                        <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2"
                            fill="none" stroke-linecap="round" stroke-linejoin="round" class="icon">
                            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z">
                            </path>
                        </svg>
                        Selecionar Pasta
                    </label>
                    <p id="file-count">Nenhuma pasta selecionada</p>
                </div>

                <!-- Aba 1: Novo Repositório (O código que já fizemos) -->
                <div id="area-upload">
                    <input type="text" id="repo-name" class="modern-input"
                        placeholder="Nome do novo repositório (ex: meu-app)">
                    <button id="btn-upload" class="btn-primary w-100">Criar Repositório e Enviar</button>
                </div>

                <!-- Aba 2: Pull Request (Vamos programar daqui a pouco) -->
                <div id="area-pr" style="display: none;">
                    <select id="repo-select" class="modern-input">
                        <option value="">Carregando seus repositórios...</option>
                    </select>
                    <!-- Novo: Selecionar a Branch -->
                    <select id="branch-select" class="modern-input" style="display: none;">
                        <option value="">Selecione a Branch Base</option>
                    </select>
                    <!-- Novo: Mensagem de Commit -->
                    <input type="text" id="commit-message" class="modern-input"
                        placeholder="Opcional: Mensagem curta (ex: layout)">
                    <button id="btn-pr" class="btn-primary w-100 disabled">Abrir Pull Request</button>
                </div>


                <!-- Terminal para mostrar status -->
                <div class="terminal-box">
                    <p id="status-message">Aguardando ação...</p>
                </div>
            </div>
        </div>
        <!-- Modal de Preview do README -->
        <div id="readme-modal" class="modal-overlay" style="display: none;">
            <div class="modal-content glass-panel">
                <h2 style="margin: 0;">Preview do README ✨</h2>
                <p style="color: var(--text-secondary); margin-bottom: 10px;">Edite o conteúdo antes de salvar no repositório.</p>
                <textarea id="readme-preview-text" class="modern-input" rows="12" style="height: auto; resize: vertical; font-family: monospace;"></textarea>
                <div style="display: flex; gap: 10px; margin-top: 15px;">
                    <button id="btn-cancel-readme" class="btn-secondary w-100">Pular</button>
                    <button id="btn-save-readme" class="btn-primary w-100">Salvar no GitHub</button>
                </div>
            </div>
        </div>
        <script src="script.js"></script>
</body>

</html>
